<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyheter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1f2937;
            --text-primary: #fff;
            --text-secondary: #94a3b8;
            --accent: #22c55e;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }
        .header {
            padding: 10px 14px;
            border-bottom: 2px solid var(--accent);
        }
        .header h1 {
            font-size: 1.35rem;
            font-weight: 700;
        }
        .content {
            height: calc(100% - 45px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            padding: 2px 0 0;
        }
        .news-column {
            min-width: 0;
            padding: 14px;
            background: var(--bg-primary);
        }
        .news-card {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, rgba(31, 41, 55, 0.98), rgba(15, 23, 42, 0.98));
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 16px;
            overflow: hidden;
        }
        .news-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: var(--bg-secondary);
        }
        .news-body {
            display: flex;
            flex: 1;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
        }
        .news-meta {
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        .news-title {
            font-size: 1.6rem;
            line-height: 1.15;
            color: var(--text-primary);
        }
        .news-summary {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.5;
        }
        .news-link {
            margin-top: auto;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            padding: 24px;
            text-align: center;
            background: var(--bg-card);
            border-radius: 16px;
            height: 100%;
        }
        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
            .news-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📰 Senaste nyheterna</h1>
    </div>

    <div class="content" id="newsContent">
        <div class="news-column"><div class="empty-state">Laddar nyheter...</div></div>
        <div class="news-column"><div class="empty-state">Laddar nyheter...</div></div>
    </div>

    <script>
        function renderCard(item) {
            const image = item.image
                ? `<img class="news-image" src="${item.image}" alt="${item.title}">`
                : '';
            const summary = item.summary
                ? `<div class="news-summary">${item.summary}</div>`
                : '';

            return `
                <article class="news-card">
                    ${image}
                    <div class="news-body">
                        <div class="news-meta">${item.published_at || 'Senaste nytt'}</div>
                        <h2 class="news-title">${item.title}</h2>
                        ${summary}
                        <a class="news-link" href="${item.url}" target="_blank" rel="noopener noreferrer">Läs mer</a>
                    </div>
                </article>
            `;
        }

        async function loadNews() {
            const content = document.getElementById('newsContent');
            try {
                const response = await fetch(`data/calendar.json?t=${Date.now()}`);
                if (!response.ok) throw new Error('Kunde inte läsa datafilen');
                const data = await response.json();
                const items = (data.latest_news || []).slice(0, 2);

                if (items.length === 0) {
                    content.innerHTML = '<div class="news-column" style="grid-column:1/-1"><div class="empty-state">Inga nyheter hittades.</div></div>';
                    return;
                }

                content.innerHTML = items
                    .map(item => `<div class="news-column">${renderCard(item)}</div>`)
                    .join('');
            } catch (error) {
                content.innerHTML = `<div class="news-column" style="grid-column:1/-1"><div class="empty-state">Kunde inte ladda nyheter.<br>${error.message}</div></div>`;
            }
        }

        loadNews();
        setInterval(loadNews, 300000);
    </script>
</body>
</html>
