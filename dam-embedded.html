<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damer - Tabell & Matcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #ec4899;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            font-family: 'Inter', sans-serif;
            color: #fff;
        }
        
        .header {
            background: linear-gradient(135deg, var(--bg-secondary), #3b1f4a);
            padding: 10px 14px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 1.35rem;
            font-weight: 700;
        }
        
        .content {
            height: calc(100% - 45px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
        }
        
        .section {
            background: var(--bg-primary);
            overflow: hidden;
        }
        .match-section {
            display: flex;
            flex-direction: column;
        }
        
        .section-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            padding: 6px 10px;
            background: var(--bg-secondary);
        }
        
        iframe {
            width: 100%;
            height: calc(100% - 25px);
            border: none;
        }
        .match-frame {
            flex: 1 1 auto;
            min-height: 0;
            height: auto;
        }
        .team-photo {
            flex: 0 0 auto;
            border-top: 2px solid rgba(255,255,255,0.08);
            background: #111827;
        }
        .team-photo img {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Damer</h1>
        </div>
    </div>
    
    <div class="content">
        <div class="section">
            <div class="section-title">Tabell</div>
            <iframe src="https://www.everysport.com/widget?teamId=25090&seriesId=144820&type=standings"
                    style="height:100%;width:100%!important;background:#0f172a;"
                    frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="section match-section">
            <div class="section-title">Kommande matcher</div>
            <iframe class="match-frame" src="calendar-embedded.html?team=Dam&type=Match&compact=1"
                    style="width:100%!important;"
                    frameborder="0"></iframe>
            <div class="team-photo">
                <img src="https://www.kronangsif.se/images/200/5653/0529FB6E-AF32-428E-8520-6CC36AA99B47_1655807.JPG?v=2024-06-24%2015:20:15"
                     alt="Damer lagfoto">
            </div>
        </div>
    </div>
</body>
</html>
