<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kronängs IF - Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="kronang-logo.svg">
    <link rel="apple-touch-icon" href="kronang-logo.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #fff;
            --text-secondary: #94a3b8;
            --accent: #22c55e;
            --accent-blue: #3b82f6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        .dashboard-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .dashboard-container.active { display: block; }
        .dashboard-container.side-by-side {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .dashboard-container iframe, 
        .dashboard-container .embedded-content {
            width: 100%;
            height: calc(100vh - 120px);
            border: none;
            border-radius: 12px;
            background: #fff;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-image {
            height: 40px;
            width: auto;
            display: block;
            flex-shrink: 0;
        }
        
        .logo-icon { font-size: 28px; }
        
        .logo-text h1 {
            margin: 0;
            font-size: 22px;
            background: linear-gradient(90deg, var(--accent), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle { color: var(--text-secondary); font-size: 14px; }
        
        .page-indicator { 
            display: flex; 
            gap: 8px; 
            align-items: center;
        }
        .page-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s;
        }
        .page-dot.active { background: var(--accent); transform: scale(1.2); }
        .page-dot:hover { background: rgba(255,255,255,0.5); }
        
        .timestamp { color: var(--text-secondary); font-size: 0.85rem; }
        
        /* TV Mode */
        body.tv-mode { padding: 20px; }
        body.tv-mode .header { padding: 15px 30px; }
        body.tv-mode h1 { font-size: 28px; }
        body.tv-mode .dashboard-container iframe {
            height: calc(100vh - 100px);
        }
        
        .footer {
            text-align: center;
            padding: 15px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        .footer a { color: var(--accent); text-decoration: none; }
        
        /* Mobile */
        @media (max-width: 768px) {
            .dashboard-container.side-by-side {
                grid-template-columns: 1fr;
            }
        }
        
        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50vh;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <img class="logo-image" src="kronang-logo.svg" alt="Kronängs IF">
            <div class="logo-text">
                <h1>Kronängs IF</h1>
                <span class="subtitle" id="pageTitle">Dashboard</span>
            </div>
        </div>
        <div class="page-indicator" id="pageIndicator"></div>
    </div>
    
    <div id="content">
        <div class="loading">Laddar...</div>
    </div>
    
    <div class="footer">
        <a href="#" onclick="toggleTvMode()">TV-läge</a> | 
        <a href="https://www.kronangsif.se" target="_blank">kronangsif.se</a>
    </div>

    <script>
        let config = null;
        let currentPageIndex = 0;
        let currentGroupIndex = 0;
        let rotationTimer = null;
        
        async function init() {
            try {
                const response = await fetch('config.json');
                config = await response.json();
                
                document.title = config.title || 'Kronängs IF';
                updateTimestamp();
                
                setupPageIndicator();
                
                if (config.rotation && config.rotation.enabled) {
                    startRotation();
                }
                
                showPage(0);
                setInterval(updateTimestamp, 60000);
            } catch (e) {
                console.error('Init error:', e);
                document.getElementById('content').innerHTML = 
                    '<div class="loading" style="color:#ef4444">Laddarfel: ' + e.message + '</div>';
            }
        }
        
        function updateTimestamp() {
            const now = new Date();
            const page = getCurrentPage();
            const title = page ? (page.icon + ' ' + page.title) : 'Dashboard';
            document.getElementById('pageTitle').textContent = title + ' | ' + now.toLocaleString('sv-SE');
        }
        
        function getCurrentPage() {
            if (!config.pageGroups || config.pageGroups.length === 0) return null;
            const currentGroup = config.pageGroups[currentGroupIndex];
            if (!currentGroup) return null;
            const pageId = currentGroup.pages[currentPageIndex];
            return config.pages.find(p => p.id === pageId);
        }
        
        function setupPageIndicator() {
            const indicator = document.getElementById('pageIndicator');
            indicator.innerHTML = '';
            
            if (!config.pageGroups) return;
            
            // Show all pages from all groups for manual selection
            const allPages = config.pages;
            allPages.forEach((page, idx) => {
                const dot = document.createElement('div');
                dot.className = 'page-dot';
                dot.title = page.title;
                dot.onclick = () => {
                    // Find group containing this page
                    for (let g = 0; g < config.pageGroups.length; g++) {
                        const group = config.pageGroups[g];
                        const pageIdx = group.pages.indexOf(page.id);
                        if (pageIdx >= 0) {
                            currentGroupIndex = g;
                            currentPageIndex = pageIdx;
                            break;
                        }
                    }
                    showPage(currentPageIndex);
                    resetRotation();
                };
                indicator.appendChild(dot);
            });
            
            updateIndicatorState();
        }
        
        function updateIndicatorState() {
            const dots = document.querySelectorAll('.page-dot');
            dots.forEach(dot => dot.classList.remove('active'));
            
            // Find current page and mark it
            const currentPage = getCurrentPage();
            if (currentPage) {
                const pageIdx = config.pages.findIndex(p => p.id === currentPage.id);
                if (pageIdx >= 0 && dots[pageIdx]) {
                    dots[pageIdx].classList.add('active');
                }
            }
        }
        
        function showPage(index) {
            const currentGroup = config.pageGroups[currentGroupIndex];
            if (!currentGroup) return;
            
            const pageId = currentGroup.pages[index];
            const page = config.pages.find(p => p.id === pageId);
            if (!page) return;
            
            currentPageIndex = index;
            updateTimestamp();
            updateIndicatorState();
            
            const content = document.getElementById('content');
            const isSideBySide = currentGroup.displayMode === 'sideBySide';
            
            let html = '';
            
            if (isSideBySide) {
                html = '<div class="dashboard-container active side-by-side">';
                currentGroup.pages.forEach(pId => {
                    const p = config.pages.find(x => x.id === pId);
                    html += `<div class="embedded-content"><iframe src="${p.file}" frameborder="0"></iframe></div>`;
                });
                html += '</div>';
            } else {
                html = `<div class="dashboard-container active">
                    <iframe src="${page.file}" frameborder="0"></iframe>
                </div>`;
            }
            
            content.innerHTML = html;
        }
        
        function startRotation() {
            if (rotationTimer) clearInterval(rotationTimer);
            
            const interval = (config.rotation.intervalSeconds || 30) * 1000;
            rotationTimer = setInterval(() => {
                nextPage();
            }, interval);
        }
        
        function resetRotation() {
            if (config.rotation && config.rotation.enabled) {
                startRotation();
            }
        }
        
        function nextPage() {
            const currentGroup = config.pageGroups[currentGroupIndex];
            if (!currentGroup) return;
            
            // Move to next group or page
            currentPageIndex++;
            if (currentPageIndex >= currentGroup.pages.length) {
                currentPageIndex = 0;
                // Optionally rotate groups too
                if (config.rotation.groups && config.rotation.groups.length > 1) {
                    currentGroupIndex = (currentGroupIndex + 1) % config.rotation.groups.length;
                }
            }
            showPage(currentPageIndex);
        }
        
        function toggleTvMode() {
            document.body.classList.toggle('tv-mode');
            return false;
        }
        
        init();
    </script>
</body>
</html>
