<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1f2937;
            --text-primary: #fff;
            --text-secondary: #94a3b8;
            --accent: #1877f2;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }
        .header {
            padding: 10px 14px;
            border-bottom: 2px solid var(--accent);
        }
        .header h1 {
            font-size: 1.35rem;
            font-weight: 700;
        }
        .frame-wrap {
            height: calc(100% - 45px);
            padding: 14px;
            background: var(--bg-primary);
        }
        .frame-card {
            height: 100%;
            background: linear-gradient(180deg, rgba(31, 41, 55, 0.98), rgba(15, 23, 42, 0.98));
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 16px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #fff;
        }
        .fallback {
            display: flex;
            height: 100%;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-secondary);
            padding: 24px;
        }
        .fallback a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📘 KIF på Facebook</h1>
    </div>

    <div class="frame-wrap">
        <div class="frame-card">
            <iframe
                title="Kronängs IF Facebook"
                src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fkronangsifofficial&tabs=timeline&width=1200&height=900&small_header=true&adapt_container_width=true&hide_cover=false&show_facepile=false&appId"
                loading="lazy"
                allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
            </iframe>
            <noscript>
                <div class="fallback">
                    <div>
                        Facebook-flödet kräver JavaScript.<br>
                        <a href="https://www.facebook.com/kronangsifofficial" target="_blank" rel="noopener noreferrer">Öppna Kronängs IF på Facebook</a>
                    </div>
                </div>
            </noscript>
        </div>
    </div>
</body>
</html>
