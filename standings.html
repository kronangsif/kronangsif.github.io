<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kronängs IF - Tabell</title>
    <link rel="icon" type="image/png" href="kronang-logo.png">
    <link rel="apple-touch-icon" href="kronang-logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-primary, #0f172a);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-image {
            height: 40px;
            width: auto;
            display: block;
            flex-shrink: 0;
        }
        .logo-icon {
            font-size: 32px;
        }
        .logo-text h1 {
            margin: 0;
            font-size: 24px;
            color: #fff;
        }
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .iframe-container {
            width: 100%;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 1031px;
            max-height: 1031px;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img class="logo-image" src="kronang-logo.png" alt="Kronängs IF">
                <div class="logo-text">
                    <h1>Kronängs IF</h1>
                    <span class="subtitle">Tabell</span>
                </div>
            </div>
        </header>

        <div class="iframe-container">
            <iframe 
                src="https://www.everysport.com/widget?seriesId=144647&type=standings" 
                style="height:492px;max-height:1031px!important;max-width:768px!important;width:100%!important;" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </div>
</body>
</html>
