<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #fff;
            --text-secondary: #94a3b8;
            --accent: #22c55e;
            --accent-blue: #3b82f6;
            --accent-yellow: #eab308;
            --accent-red: #ef4444;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 15px;
        }

        body.compact {
            padding: 0;
        }
        
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--bg-card);
        }
        
        .month-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .last-updated {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        body.compact .header-bar {
            display: none;
        }
        
        .calendar-container {
            height: calc(100% - 50px);
            overflow-y: auto;
            padding-right: 10px;
        }

        body.compact .calendar-container {
            height: 100%;
            padding-right: 0;
        }
        
        .calendar-container::-webkit-scrollbar {
            width: 6px;
        }
        .calendar-container::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        .calendar-container::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 3px;
        }
        
        .calendar-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .day-row {
            display: grid;
            grid-template-columns: 70px 1fr;
            gap: 15px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 10px;
            align-items: center;
        }
        
        .day-row.today {
            border: 2px solid var(--accent);
        }
        
        .day-date {
            text-align: center;
        }
        
        .day-date .weekday {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        .day-date .day-num {
            font-size: 1.6rem;
            font-weight: 700;
        }
        
        .day-date .month {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        .events {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .event {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--bg-card);
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }
        
        .event.match {
            border-left-color: var(--accent);
        }
        
        .event.training {
            border-left-color: var(--accent-blue);
        }
        
        .event.other {
            border-left-color: var(--accent-yellow);
        }
        
        .event-time {
            font-weight: 600;
            min-width: 50px;
            font-size: 0.85rem;
        }
        
        .event-info {
            flex: 1;
            min-width: 0;
        }
        
        .event-team {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .event-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .event-location {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        .event-weather {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        
        .weather-icon {
            font-size: 1rem;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-secondary);
        }
        
        .no-events {
            padding: 20px;
            text-align: center;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="month-title" id="monthTitle">Laddar...</div>
        <div class="last-updated" id="lastUpdated"></div>
    </div>
    
    <div class="calendar-container">
        <div class="calendar-grid" id="calendarGrid">
            <div class="loading">Laddar kalender...</div>
        </div>
    </div>

    <script>
        const MONTHS = ['januari', 'februari', 'mars', 'april', 'maj', 'juni', 
                       'juli', 'augusti', 'september', 'oktober', 'november', 'december'];
        const WEEKDAYS = ['sön', 'mån', 'tis', 'ons', 'tor', 'fre', 'lör'];
        
        const TYPE_ICONS = {
            'Träning': '🏋️',
            'Match': '⚽',
            'Övrigt': '📋',
            'Cup': '🏆'
        };
        
        const TYPE_CLASSES = {
            'Träning': 'training',
            'Match': 'match',
            'Övrigt': 'other',
            'Cup': 'match'
        };
        
        async function loadCalendar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const compact = urlParams.get('compact') === '1';

                if (compact) {
                    document.body.classList.add('compact');
                }

                console.log('Loading calendar...');
                // Use root-relative path
                const response = await fetch('/data/calendar.json');
                if (!response.ok) throw new Error('Network response was not ok: ' + response.status);
                console.log('Got response, parsing JSON...');
                const data = await response.json();
                console.log('JSON parsed, activities:', data.activities.length);
                
                // Update header
                document.getElementById('monthTitle').textContent = 
                    `${MONTHS[data.month - 1]} ${data.year}`;
                document.getElementById('lastUpdated').textContent = 
                    `Uppdaterad: ${new Date(data.last_updated).toLocaleString('sv-SE')}`;
                
                // Get filters from URL params
                const filterTeam = urlParams.get('team');  // e.g., "Herr", "Dam"
                const filterType = urlParams.get('type');   // e.g., "Match", "Träning"
                const filterDay = urlParams.get('day');      // 0 = today, 1 = tomorrow
                
                // Update title if filtering
                let title = '';
                if (filterTeam || filterType) {
                    const filters = [];
                    if (filterTeam) filters.push(filterTeam);
                    if (filterType) filters.push(filterType);
                    title = filters.join(' + ');
                }
                if (filterDay !== null) {
                    const days = ['Idag', 'Imorgon'];
                    title = days[parseInt(filterDay)] || title;
                }
                if (title) {
                    document.getElementById('monthTitle').textContent = title;
                }
                
                // Group activities by date - only future activities, with filters
                const today = new Date().toISOString().split('T')[0];
                let activities = data.activities.filter(a => a.date >= today);
                
                // Apply team filter
                if (filterTeam) {
                    activities = activities.filter(a => a.team && a.team.toLowerCase().includes(filterTeam.toLowerCase()));
                }
                
                // Apply type filter
                if (filterType) {
                    activities = activities.filter(a => a.type && a.type.toLowerCase() === filterType.toLowerCase());
                }
                
                // Apply day filter (0 = today, 1 = tomorrow)
                if (filterDay !== null) {
                    const targetDate = new Date();
                    targetDate.setDate(targetDate.getDate() + parseInt(filterDay));
                    const targetStr = targetDate.toISOString().split('T')[0];
                    activities = activities.filter(a => a.date === targetStr);
                }
                
                console.log('Filtered activities:', activities.length, 'team:', filterTeam, 'type:', filterType);
                
                const grouped = {};
                
                activities.forEach(act => {
                    if (!grouped[act.date]) {
                        grouped[act.date] = [];
                    }
                    grouped[act.date].push(act);
                });
                
                // Sort dates
                const sortedDates = Object.keys(grouped).sort();
                
                // Build calendar
                const grid = document.getElementById('calendarGrid');
                let html = '';
                
                sortedDates.forEach(date => {
                    const events = grouped[date];
                    const isToday = date === today;
                    const dateObj = new Date(date + 'T12:00:00');
                    const weekday = WEEKDAYS[dateObj.getDay()];
                    const dayNum = dateObj.getDate();
                    
                    html += `
                        <div class="day-row ${isToday ? 'today' : ''}">
                            <div class="day-date">
                                <div class="weekday">${weekday}</div>
                                <div class="day-num">${dayNum}</div>
                                <div class="month">${MONTHS[dateObj.getMonth()].slice(0,3)}</div>
                            </div>
                            <div class="events">
                    `;
                    
                    events.forEach(ev => {
                        const icon = TYPE_ICONS[ev.type] || '📌';
                        const typeClass = TYPE_CLASSES[ev.type] || 'other';
                        
                        html += `
                            <div class="event ${typeClass}">
                                <span class="event-time">${ev.time}</span>
                                <div class="event-info">
                                    <div class="event-team">${icon} ${ev.team}</div>
                                    <div class="event-desc">${ev.description || ev.type}</div>
                                    <div class="event-location">${ev.location || ''}</div>
                                </div>
                                ${ev.weather ? `
                                    <div class="event-weather">
                                        <span class="weather-icon">${ev.weather.icon}</span>
                                        <span>${ev.weather.temp}°C</span>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    });
                    
                    html += '</div></div>';
                });
                
                grid.innerHTML = html;
                
            } catch (e) {
                console.error('Error loading calendar:', e);
                document.getElementById('calendarGrid').innerHTML = 
                    '<div class="loading" style="color:#ef4444">Laddfel: ' + e.message + '<br><br>' + e.stack + '</div>';
            }
        }
        
        // Auto-refresh every 5 minutes
        loadCalendar();
        setInterval(loadCalendar, 300000);
    </script>
</body>
</html>
