<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Välkommen till Kronängs IF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #07111f;
            --panel: rgba(15, 23, 42, 0.88);
            --panel-2: rgba(30, 41, 59, 0.92);
            --border: rgba(148, 163, 184, 0.18);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #22c55e;
            --accent-2: #38bdf8;
            --warning: #f59e0b;
        }
        html, body {
            height: 100%;
            background:
                radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 32%),
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.14), transparent 24%),
                linear-gradient(180deg, #050b15 0%, var(--bg) 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 20px 22px 16px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(5, 11, 21, 0.96), rgba(5, 11, 21, 0.6));
            backdrop-filter: blur(10px);
        }
        .hero-brand {
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 0;
        }
        .logo {
            width: clamp(72px, 8vw, 110px);
            height: clamp(72px, 8vw, 110px);
            object-fit: contain;
            flex: 0 0 auto;
            filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.3));
        }
        .title-wrap {
            min-width: 0;
        }
        h1 {
            font-size: clamp(2.2rem, 4.8vw, 4.4rem);
            line-height: 0.96;
            font-weight: 800;
            letter-spacing: -0.04em;
        }
        .subtitle {
            margin-top: 10px;
            color: var(--muted);
            font-size: 1.05rem;
            max-width: 52rem;
        }
        .meta {
            text-align: right;
            flex: 0 0 auto;
        }
        .date {
            font-size: 1.05rem;
            font-weight: 700;
        }
        .updated {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.85rem;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(34, 197, 94, 0.12);
            color: #bbf7d0;
            border: 1px solid rgba(34, 197, 94, 0.22);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.12);
        }
        .content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 20px 22px 24px;
        }
        .content::-webkit-scrollbar {
            width: 8px;
        }
        .content::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.28);
            border-radius: 999px;
        }
        .cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        .match-card {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 220px;
            padding: 18px;
            width: 100%;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.98), rgba(8, 14, 25, 0.98));
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 26px 60px rgba(0, 0, 0, 0.22);
            position: relative;
            overflow: hidden;
        }
        .match-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.08), transparent 55%);
            pointer-events: none;
        }
        .match-top {
            display: block;
            position: relative;
            z-index: 1;
        }
        .kickoff {
            display: none;
        }
        .tag {
            display: none;
        }
        .team-row {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
        }
        .team {
            font-size: clamp(1.1rem, 1.7vw, 1.45rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.03em;
            color: #cbd5e1;
            text-transform: uppercase;
            flex: 1 1 auto;
            min-width: 0;
        }
        .meta-line {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.45em;
            font-size: 1.12rem;
            line-height: 1.2;
            font-weight: 700;
            color: #cbd5e1;
        }
        .meta-line .meta-team {
            color: #dbeafe;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        .meta-line .meta-venue {
            color: #94a3b8;
            font-weight: 700;
        }
        .meta-line .meta-sep {
            color: #718096;
            font-weight: 800;
        }
        .match-title {
            position: relative;
            z-index: 1;
            display: block;
            font-size: clamp(2.1rem, 3.4vw, 3.6rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -0.06em;
            color: var(--text);
        }
        .match-title .match-home {
            color: #86efac;
        }
        .match-title .match-away {
            color: #93c5fd;
        }
        .desc {
            position: relative;
            z-index: 1;
            font-size: 1.02rem;
            font-weight: 700;
            color: #e2e8f0;
        }
        .details {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: auto;
        }
        .detail-box {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }
        .detail-label {
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .detail-value {
            font-size: 1rem;
            line-height: 1.35;
            font-weight: 600;
        }
        .room-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }
        .room-card {
            border-radius: 16px;
            padding: 16px 16px 15px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(255, 255, 255, 0.05);
            min-height: 132px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 12px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        .room-card.home {
            background: linear-gradient(180deg, rgba(34, 197, 94, 0.24), rgba(255, 255, 255, 0.05));
            border-color: rgba(34, 197, 94, 0.34);
        }
        .room-card.away {
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.22), rgba(255, 255, 255, 0.05));
            border-color: rgba(56, 189, 248, 0.3);
        }
        .room-head {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 900;
        }
        .room-card.home .room-head {
            color: #dcfce7;
        }
        .room-card.home .room-code {
            color: #f0fdf4;
        }
        .room-card.away .room-head {
            color: #e0f2fe;
        }
        .room-card.away .room-code {
            color: #eff6ff;
        }
        .room-code {
            font-size: clamp(2.1rem, 3vw, 2.8rem);
            line-height: 0.95;
            font-weight: 900;
            letter-spacing: -0.06em;
            margin-top: 2px;
        }
        .venue-main {
            color: #cbd5e1;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .venue-detail {
            color: #94a3b8;
        }
        .room-note {
            color: rgba(248, 250, 252, 0.82);
            font-size: 0.92rem;
            line-height: 1.35;
        }
        .weather {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            font-size: 1rem;
            font-weight: 700;
            min-height: 48px;
        }
        .weather::first-letter {
            text-transform: uppercase;
        }
        .empty {
            grid-column: 1 / -1;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
            padding: 28px;
            border-radius: 22px;
            border: 1px dashed rgba(148, 163, 184, 0.25);
            background: rgba(15, 23, 42, 0.5);
            color: var(--muted);
        }
        .empty strong {
            color: var(--text);
            font-size: 1.2rem;
        }
        @media (max-width: 1100px) {
            .cards {
                grid-template-columns: 1fr;
            }
            .details {
                grid-template-columns: 1fr;
            }
            .room-grid {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 720px) {
            .hero {
                flex-direction: column;
                align-items: flex-start;
            }
            .hero-brand {
                align-items: flex-start;
            }
            .meta {
                text-align: left;
            }
            .content {
                padding: 16px;
            }
            .match-card {
                min-height: 200px;
            }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="hero-brand">
            <img class="logo" src="kronang-logo-2026.png" alt="Kronängs IF logotyp">
            <div class="title-wrap">
                <div class="badge"><span class="badge-dot"></span>Hemmamatcher idag</div>
                <h1>Välkommen till Kronängs IF</h1>
            </div>
        </div>
        <div class="meta">
            <div class="date" id="dateLabel">-</div>
            <div class="updated" id="updatedLabel">Laddar...</div>
        </div>
    </header>

    <main class="content">
        <section class="cards" id="cards">
            <div class="empty"><strong>Laddar matcher...</strong><span>Hämtar dagens data.</span></div>
        </section>
    </main>

    <script>
        function todayIsoLocal() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatLocalDate(dateIso) {
            const date = new Date(`${dateIso}T12:00:00`);
            const formatter = new Intl.DateTimeFormat('sv-SE', {
                weekday: 'long',
                day: 'numeric',
                month: 'long'
            });
            const label = formatter.format(date);
            return label.charAt(0).toUpperCase() + label.slice(1);
        }

        function formatUpdatedLabel(value) {
            if (!value) return 'Senast uppdaterad: okänt';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return 'Senast uppdaterad: okänt';
            return `Senast uppdaterad: ${date.toLocaleString('sv-SE')}`;
        }

        function formatVenue(location) {
            const cleaned = cleanLocation(location || '');
            const match = cleaned.match(/^(Kronängs?\s+Arena)\s*(.*)$/i);
            if (!match) {
                return {
                    main: cleaned || 'Kronäng Arena',
                    detail: ''
                };
            }

            return {
                main: 'Kronäng Arena',
                detail: normalizeVenueDetail(match[2])
            };
        }

        function normalizeVenueDetail(detail) {
            if (!detail) return '';
            return detail
                .replace(/^\s*\(+\s*/, '')
                .replace(/\s*\)+\s*$/, '')
                .replace(/\(\s*\)/g, '')
                .trim();
        }

        function parseOpponent(description) {
            if (!description) return 'Motståndarlaget';
            const firstPart = description.split(',')[0].trim();
            const withoutVenueWord = firstPart.replace(/\s+(hemma|borta)\s*$/i, '').trim();
            return withoutVenueWord || 'Motståndarlaget';
        }

        function isHomeMatch(item) {
            const haystack = [item.team, item.description, item.location]
                .filter(Boolean)
                .join(' ')
                .toLowerCase();
            if (haystack.includes('borta')) return false;
            return haystack.includes('hemma');
        }

        function cleanLocation(location) {
            if (!location) return '';
            return location.replace(/\(\s*\)\s*$/, '').trim();
        }

        function parseHomeNotation(description) {
            if (!description) return null;
            const match = description.match(/\(\s*(H\d+)\s*(B\d+)\s*\)\s*$/i);
            if (!match) return null;
            return {
                raw: `${match[1].toUpperCase()}${match[2].toUpperCase()}`,
                home: match[1].toUpperCase(),
                away: match[2].toUpperCase()
            };
        }

        function stripHomeNotation(description) {
            if (!description) return '';
            return description.replace(/\(\s*H\d+\s*B\d+\s*\)\s*$/i, '').trim();
        }

        function getWeatherLabel(weather) {
            if (!weather) return '';
            return `${weather.icon || ''} ${Math.round(weather.temp)}°C · ${weather.desc || ''}`.trim();
        }

        function renderCard(match) {
            const notation = match.lockerooms || parseHomeNotation(match.description);
            const cleanDescription = stripHomeNotation(match.description || '');
            const homeRoom = notation?.home || '';
            const awayRoom = notation?.away || '';
            const venue = formatVenue(match.location || '');
            const opponentName = parseOpponent(cleanDescription || match.description || '');
            const weatherLabel = getWeatherLabel(match.weather);

            return `
                <article class="match-card">
                    <div class="match-title">${match.time || 'Tid saknas'} - <span class="match-home">Kronäng</span> vs <span class="match-away">${opponentName}</span></div>
                    <div class="meta-line">
                        <span class="meta-team">${match.team || 'Okänt lag'}</span>
                        <span class="meta-sep">•</span>
                        <span class="meta-venue">${venue.main}${venue.detail ? ` (${venue.detail})` : ''}</span>
                    </div>
                    <div class="details">
                        <div class="detail-box">
                            <div class="detail-label">Omklädningsrum</div>
                            <div class="detail-value">
                                <div class="room-grid">
                                    <div class="room-card home">
                                        <div class="room-head"><span class="match-home">Kronäng</span></div>
                                        <div class="room-code">${homeRoom ? `Omklädningsrum ${homeRoom.replace(/^H/i, '')}` : 'Omklädningsrum ?'}</div>
                                        <div class="room-note">${homeRoom ? 'Det här är omklädningsrummet för Kronäng.' : 'Omklädningsrum är inte angivet ännu.'}</div>
                                    </div>
                                    <div class="room-card away">
                                        <div class="room-head"><span class="match-away">${opponentName}</span></div>
                                        <div class="room-code">${awayRoom ? `Omklädningsrum ${awayRoom.replace(/^B/i, '')}` : 'Omklädningsrum ?'}</div>
                                        <div class="room-note">${awayRoom ? `Det här är omklädningsrummet för ${opponentName}.` : 'Omklädningsrum är inte angivet ännu.'}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    ${weatherLabel ? `<div class="weather" title="${match.weather.desc || ''}">${weatherLabel}</div>` : ''}
                </article>
            `;
        }

        async function loadPage() {
            const todayIso = todayIsoLocal();
            document.getElementById('dateLabel').textContent = formatLocalDate(todayIso);

            try {
                const response = await fetch(`data/calendar.json?t=${Date.now()}`);
                if (!response.ok) throw new Error('Kunde inte läsa data/calendar.json');
                const data = await response.json();

                const homeMatches = (data.activities || [])
                    .filter(item => item.type === 'Match')
                    .filter(item => item.date === todayIso)
                    .filter(isHomeMatch)
                    .sort((a, b) => `${a.time || ''} ${a.team || ''}`.localeCompare(`${b.time || ''} ${b.team || ''}`));

                document.getElementById('updatedLabel').textContent = formatUpdatedLabel(data.last_updated);

                const cards = document.getElementById('cards');
                if (!homeMatches.length) {
                    cards.innerHTML = `
                        <div class="empty">
                            <strong>Inga hemmamatcher idag</strong>
                            <span>Det finns inga matchhändelser som matchar dagens datum och hemma.</span>
                        </div>
                    `;
                    return;
                }

                cards.innerHTML = homeMatches.map(renderCard).join('');
            } catch (error) {
                document.getElementById('updatedLabel').textContent = 'Kunde inte ladda sidan';
                document.getElementById('cards').innerHTML = `
                    <div class="empty">
                        <strong>Kunde inte ladda data</strong>
                        <span>${error.message}</span>
                    </div>
                `;
            }
        }

        loadPage();
        setInterval(loadPage, 300000);
    </script>
</body>
</html>
