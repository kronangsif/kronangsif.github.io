<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagens hemmamatcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #07111f;
            --panel: rgba(15, 23, 42, 0.88);
            --panel-2: rgba(30, 41, 59, 0.92);
            --border: rgba(148, 163, 184, 0.18);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #22c55e;
            --accent-2: #38bdf8;
            --warning: #f59e0b;
        }
        html, body {
            height: 100%;
            background:
                radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 32%),
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.14), transparent 24%),
                linear-gradient(180deg, #050b15 0%, var(--bg) 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            padding: 18px 22px 12px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(5, 11, 21, 0.96), rgba(5, 11, 21, 0.6));
            backdrop-filter: blur(10px);
        }
        .title-wrap {
            min-width: 0;
        }
        .eyebrow {
            color: var(--accent-2);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.72rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        h1 {
            font-size: clamp(2rem, 4vw, 3.6rem);
            line-height: 0.95;
            font-weight: 800;
            letter-spacing: -0.04em;
        }
        .subtitle {
            margin-top: 8px;
            color: var(--muted);
            font-size: 1rem;
        }
        .meta {
            text-align: right;
            flex: 0 0 auto;
        }
        .date {
            font-size: 1.05rem;
            font-weight: 700;
        }
        .updated {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.85rem;
        }
        .content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 20px 22px 24px;
        }
        .content::-webkit-scrollbar {
            width: 8px;
        }
        .content::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.28);
            border-radius: 999px;
        }
        .summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }
        .stat {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 18px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.18);
        }
        .stat-label {
            color: var(--muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
        }
        .stat-value {
            margin-top: 8px;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }
        .match-card {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 220px;
            padding: 18px;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.98), rgba(8, 14, 25, 0.98));
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 26px 60px rgba(0, 0, 0, 0.22);
            position: relative;
            overflow: hidden;
        }
        .match-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.08), transparent 55%);
            pointer-events: none;
        }
        .match-top {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }
        .kickoff {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(34, 197, 94, 0.12);
            color: #bbf7d0;
            font-weight: 800;
            letter-spacing: 0.04em;
        }
        .tag {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: #bae6fd;
            font-size: 0.84rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .team {
            position: relative;
            z-index: 1;
            font-size: clamp(1.6rem, 2.5vw, 2.6rem);
            font-weight: 800;
            line-height: 1.02;
            letter-spacing: -0.05em;
        }
        .desc {
            position: relative;
            z-index: 1;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
        }
        .details {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 12px;
            margin-top: auto;
        }
        .detail-box {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }
        .detail-label {
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .detail-value {
            font-size: 1rem;
            line-height: 1.35;
            font-weight: 600;
        }
        .room-value {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .room-pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(148, 163, 184, 0.16);
            font-weight: 700;
        }
        .room-pill.home {
            background: rgba(34, 197, 94, 0.16);
            border-color: rgba(34, 197, 94, 0.25);
            color: #bbf7d0;
        }
        .room-pill.away {
            background: rgba(56, 189, 248, 0.14);
            border-color: rgba(56, 189, 248, 0.22);
            color: #bae6fd;
        }
        .weather {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-size: 0.88rem;
            font-weight: 600;
        }
        .empty {
            grid-column: 1 / -1;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
            padding: 28px;
            border-radius: 22px;
            border: 1px dashed rgba(148, 163, 184, 0.25);
            background: rgba(15, 23, 42, 0.5);
            color: var(--muted);
        }
        .empty strong {
            color: var(--text);
            font-size: 1.2rem;
        }
        @media (max-width: 1100px) {
            .summary,
            .cards {
                grid-template-columns: 1fr;
            }
            .details {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 720px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .meta {
                text-align: left;
            }
            .content {
                padding: 16px;
            }
            .match-card {
                min-height: 200px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="title-wrap">
            <div class="eyebrow">Kronängs IF</div>
            <h1>Dagens hemmamatcher</h1>
            <div class="subtitle">Visar endast matcher hemma idag och omklädningsrum när det finns angivet.</div>
        </div>
        <div class="meta">
            <div class="date" id="dateLabel">-</div>
            <div class="updated" id="updatedLabel">Laddar...</div>
        </div>
    </header>

    <main class="content">
        <section class="summary" id="summary">
            <div class="stat">
                <div class="stat-label">Hemmamatcher idag</div>
                <div class="stat-value" id="homeCount">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">Första avspark</div>
                <div class="stat-value" id="firstKickoff">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">Med rum angivet</div>
                <div class="stat-value" id="roomCount">-</div>
            </div>
        </section>

        <section class="cards" id="cards">
            <div class="empty"><strong>Laddar matcher...</strong><span>Hämtar dagens data.</span></div>
        </section>
    </main>

    <script>
        function todayIsoLocal() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatLocalDate(dateIso) {
            const date = new Date(`${dateIso}T12:00:00`);
            const formatter = new Intl.DateTimeFormat('sv-SE', {
                weekday: 'long',
                day: 'numeric',
                month: 'long'
            });
            const label = formatter.format(date);
            return label.charAt(0).toUpperCase() + label.slice(1);
        }

        function formatUpdatedLabel(value) {
            if (!value) return 'Senast uppdaterad: okänt';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return 'Senast uppdaterad: okänt';
            return `Senast uppdaterad: ${date.toLocaleString('sv-SE')}`;
        }

        function cleanLocation(location) {
            if (!location) return '';
            return location.replace(/\(\s*\)\s*$/, '').trim();
        }

        function parseHomeNotation(description) {
            if (!description) return null;
            const match = description.match(/\(\s*(H\d+)\s*(B\d+)\s*\)\s*$/i);
            if (!match) return null;
            return {
                raw: `${match[1].toUpperCase()}${match[2].toUpperCase()}`,
                home: match[1].toUpperCase(),
                away: match[2].toUpperCase()
            };
        }

        function stripHomeNotation(description) {
            if (!description) return '';
            return description.replace(/\(\s*H\d+\s*B\d+\s*\)\s*$/i, '').trim();
        }

        function getWeatherLabel(weather) {
            if (!weather) return '';
            return `${weather.icon || ''} ${Math.round(weather.temp)}°C · ${weather.desc || ''}`.trim();
        }

        function renderCard(match) {
            const notation = match.lockerooms || parseHomeNotation(match.description);
            const cleanDescription = stripHomeNotation(match.description || '');
            const location = cleanLocation(match.location || '') || 'Kronängs Arena';
            const homeRoom = notation?.home || '';
            const awayRoom = notation?.away || '';
            const weatherLabel = getWeatherLabel(match.weather);

            return `
                <article class="match-card">
                    <div class="match-top">
                        <div class="kickoff">${match.time || 'Tid saknas'}</div>
                        <div class="tag">Hemma</div>
                    </div>
                    <div class="team">${match.team || 'Okänt lag'}</div>
                    <div class="desc">${cleanDescription || 'Match hemma'}</div>
                    <div class="details">
                        <div class="detail-box">
                            <div class="detail-label">Arena</div>
                            <div class="detail-value">${location}</div>
                        </div>
                        <div class="detail-box">
                            <div class="detail-label">Omklädningsrum</div>
                            <div class="detail-value">
                                <div class="room-value">
                                    ${homeRoom ? `<span class="room-pill home">Hemma ${homeRoom.replace(/^H/i, '')}</span>` : '<span class="room-pill home">Hemma ej angivet</span>'}
                                    ${awayRoom ? `<span class="room-pill away">Borta ${awayRoom.replace(/^B/i, '')}</span>` : '<span class="room-pill away">Borta ej angivet</span>'}
                                </div>
                            </div>
                        </div>
                    </div>
                    ${weatherLabel ? `<div class="weather" title="${match.weather.desc || ''}">${weatherLabel}</div>` : ''}
                </article>
            `;
        }

        async function loadPage() {
            const todayIso = todayIsoLocal();
            document.getElementById('dateLabel').textContent = formatLocalDate(todayIso);

            try {
                const response = await fetch(`data/calendar.json?t=${Date.now()}`);
                if (!response.ok) throw new Error('Kunde inte läsa data/calendar.json');
                const data = await response.json();

                const homeMatches = (data.activities || [])
                    .filter(item => item.type === 'Match')
                    .filter(item => item.date === todayIso)
                    .filter(item => {
                        const haystack = [item.team, item.description, item.location]
                            .filter(Boolean)
                            .join(' ')
                            .toLowerCase();
                        return haystack.includes('hemma');
                    })
                    .sort((a, b) => `${a.time || ''} ${a.team || ''}`.localeCompare(`${b.time || ''} ${b.team || ''}`));

                const matchesWithRooms = homeMatches.filter(item => parseHomeNotation(item.description) || item.lockerooms).length;
                const firstKickoff = homeMatches[0]?.time || 'Inga matcher';

                document.getElementById('updatedLabel').textContent = formatUpdatedLabel(data.last_updated);
                document.getElementById('homeCount').textContent = String(homeMatches.length);
                document.getElementById('firstKickoff').textContent = firstKickoff;
                document.getElementById('roomCount').textContent = String(matchesWithRooms);

                const cards = document.getElementById('cards');
                if (!homeMatches.length) {
                    cards.innerHTML = `
                        <div class="empty">
                            <strong>Inga hemmamatcher idag</strong>
                            <span>Det finns inga matchhändelser som matchar dagens datum och hemma.</span>
                        </div>
                    `;
                    return;
                }

                cards.innerHTML = homeMatches.map(renderCard).join('');
            } catch (error) {
                document.getElementById('updatedLabel').textContent = 'Kunde inte ladda sidan';
                document.getElementById('cards').innerHTML = `
                    <div class="empty">
                        <strong>Kunde inte ladda data</strong>
                        <span>${error.message}</span>
                    </div>
                `;
            }
        }

        loadPage();
        setInterval(loadPage, 300000);
    </script>
</body>
</html>
