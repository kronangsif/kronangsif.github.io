<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Träningar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #3b82f6;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            font-family: 'Inter', sans-serif;
            color: #fff;
        }
        
        .header {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            font-size: 1rem;
            font-weight: 700;
        }
        
        .content {
            height: calc(100% - 45px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
        }
        
        .section {
            background: var(--bg-primary);
            overflow: hidden;
        }
        
        .section-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            padding: 6px 10px;
            background: var(--bg-secondary);
        }
        
        iframe {
            width: 100%;
            height: calc(100% - 25px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏋️ Träningar - Idag & Imorgon</h1>
    </div>
    
    <div class="content">
        <div class="section">
            <div class="section-title">Idag</div>
            <iframe src="calendar-embedded.html?type=Träning&day=0&compact=1"
                    style="height:100%;width:100%!important;"
                    frameborder="0"></iframe>
        </div>
        <div class="section">
            <div class="section-title">Imorgon</div>
            <iframe src="calendar-embedded.html?type=Träning&day=1&compact=1"
                    style="height:100%;width:100%!important;"
                    frameborder="0"></iframe>
        </div>
    </div>
</body>
</html>
